<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanazawa的服务器网站</title>
    <style>
        /* 选择页面上的所有“框框”，这里以常见的块级元素为例 */
        div, section, article, main, header, footer, .box, .card {
    /* 初始状态：完全透明 */
            opacity: 0; 
    /* 应用淡入动画，持续1秒，动画结束后保持最终状态 (forwards) */
            animation: fadeIn 1s ease-in-out forwards;
        }
    @keyframes fadeIn {
        from {opacity: 0;}
        to   {opacity: 1;}
    }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }
        
        body {
            background: url('img3.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            width: 100%;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            text-align: center;
            position: relative;
        }
        
        h1 {
            font-size: 2.8rem;
            margin-bottom: 30px;
            color: #fff;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
            letter-spacing: 1px;
        }
        
        .server-info {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 25px;
            margin: 30px 0;
            border: 2px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
            text-align: left;
        }
        
        .server-info:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }
        
        .server-info h2 {
            color: #4CAF50;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
        }
        
        .status-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: #4CAF50;
            margin-right: 10px;
            box-shadow: 0 0 10px #4CAF50;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(76, 175, 80, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(76, 175, 80, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(76, 175, 80, 0); }
        }
        
        .server-intro {
            line-height: 1.6;
            margin-bottom: 20px;
            font-size: 1.1rem;
        }
        
        .server-address {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
        }
        
        .address-text {
            font-family: monospace;
            font-size: 1.2rem;
            letter-spacing: 1px;
        }
        
        /* 服务器状态查询样式 */
        .server-status {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 25px;
            margin: 30px 0;
            border: 2px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }
        
        .server-status:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }
        
        .server-status h2 {
            color: #4CAF50;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .status-content {
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        
        .status-item {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            min-width: 150px;
            margin: 10px;
        }
        
        .status-label {
            font-size: 0.9rem;
            opacity: 0.8;
            margin-bottom: 5px;
        }
        
        .status-value {
            font-size: 1.2rem;
            font-weight: bold;
        }
        
        .status-online {
            color: #4CAF50;
        }
        
        .status-offline {
            color: #f44336;
        }
        
        .status-refresh {
            margin-top: 15px;
            text-align: center;
        }
        
        .refresh-btn {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        
        .refresh-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        
        .server-icon {
            width: 64px;
            height: 64px;
            border-radius: 8px;
            object-fit: cover;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }
        
        .image-gallery {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            margin: 30px 0;
        }
        
        .image-item {
            flex: 1;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }
        
        .image-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4);
        }
        
        .image-item img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            display: block;
        }
        
        .image-caption {
            padding: 15px;
            background: rgba(255, 255, 255, 0.1);
            font-size: 1rem;
        }
        
        .button-group {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 30px 0;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 12px 25px;
            font-size: 1.1rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .copy-btn {
            background: linear-gradient(to right, #4CAF50, #8BC34A);
            color: white;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }
        
        .qq-btn {
            background: linear-gradient(to right, #12B7F5, #1E90FF);
            color: white;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }
        
        .video-btn {
            background: linear-gradient(to right, #FF69B4, #FF1493);
            color: white;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }
        
        .music-btn {
            background: linear-gradient(to right, #FF9800, #FF5722);
            color: white;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }
        
        .sponsor-btn {
            background: linear-gradient(to right, #9C27B0, #E91E63);
            color: white;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }
        
        .map-btn {
            background: linear-gradient(to right, #00b09b, #96c93d);
            color: white;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }
        
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
        }
        
        .btn:active {
            transform: translateY(1px);
        }
        
        .copy-btn:hover {
            background: linear-gradient(to right, #8BC34A, #4CAF50);
        }
        
        .qq-btn:hover {
            background: linear-gradient(to right, #1E90FF, #12B7F5);
        }
        
        .video-btn:hover {
            background: linear-gradient(to right, #FF1493, #FF69B4);
        }
        
        .music-btn:hover {
            background: linear-gradient(to right, #FF5722, #FF9800);
        }
        
        .sponsor-btn:hover {
            background: linear-gradient(to right, #E91E63, #9C27B0);
        }
        
        .map-btn:hover {
            background: linear-gradient(to right, #96c93d, #00b09b);
        }
        .friend-btn {
            background: linear-gradient(to right, #6A11CB, #2575FC);
            color: white;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .friend-btn:hover {
            background: linear-gradient(to right, #2575FC, #6A11CB);
        }
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #4CAF50;
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            transform: translateX(150%);
            transition: transform 0.4s ease;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .notification.error {
            background: #ff5252;
        }
        
        .notification.show {
            transform: translateX(0);
        }
        
        .sponsor-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        
        .sponsor-overlay.active {
            display: flex;
        }
        
        .sponsor-container {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 30px;
            max-width: 800px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            position: relative;
        }
        
        .close-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: background 0.3s ease;
        }
        
        .close-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        
        .sponsor-container h2 {
            color: #E91E63;
            margin-bottom: 20px;
            text-align: center;
            font-size: 1.8rem;
        }
        
        .sponsor-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        
        .sponsor-table th {
            background: rgba(233, 30, 99, 0.3);
            color: white;
            padding: 12px 15px;
            text-align: left;
            font-weight: bold;
        }
        
        .sponsor-table td {
            padding: 12px 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .sponsor-table tr:hover {
            background: rgba(255, 255, 255, 0.05);
        }
        
        .sponsor-table .name-col {
            width: 60%;
        }
        
        .sponsor-table .amount-col {
            width: 40%;
            text-align: right;
        }
        
        .total-amount {
            margin-top: 20px;
            text-align: right;
            font-size: 1.2rem;
            font-weight: bold;
            color: #E91E63;
            padding-top: 10px;
            border-top: 2px solid rgba(233, 30, 99, 0.5);
        }
        
        footer {
            margin-top: 40px;
            font-size: 0.9rem;
            opacity: 0.7;
        }
        
        .icon {
            font-size: 1.2rem;
        }
        
        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }
            
            .container {
                padding: 25px;
            }
            
            .image-gallery {
                flex-direction: column;
            }
            
            .button-group {
                flex-direction: column;
            }
            
            .btn {
                width: 100%;
            }
            
            .server-address {
                flex-direction: column;
                gap: 15px;
            }
            
            .sponsor-container {
                padding: 20px;
            }
            
            .sponsor-table th,
            .sponsor-table td {
                padding: 8px 10px;
            }
            
            .status-content {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Kanazawa的服务器网站</h1>
        
        <div class="server-info">
            <h2><span class="status-indicator"></span>服务器介绍</h2>
            <div class="server-intro">
                <p>生电服务器， 是的，真正的生电服务器，双端支持，使用leaves服务器核心，最大限度实现生电特性与优化的平衡。 在这里，你可以冒险，也可以建造，实现你的梦想。</p>
                <p>服务器无需正版，使用第三方登录，保证游戏数据安全，可放心游玩。</p>
            </div>
            
            <div class="server-address">
                <div class="address-text">play.kanazawa.top</div>
                <button class="btn copy-btn" id="copyBtn">
                    <span class="icon">📋</span> 复制服务器地址
                </button>
            </div>
        </div>
        
        <!-- 服务器状态查询部分 -->
        <div class="server-status">
            <h2><span class="icon">📊</span> 服务器状态</h2>
            <div class="status-content">
                <div class="status-item">
                    <div class="status-label">服务器图标</div>
                    <img id="serverIcon" class="server-icon" src="https://via.placeholder.com/64/333/fff?text=图标" alt="服务器图标">
                </div>
                <div class="status-item">
                    <div class="status-label">在线玩家</div>
                    <div class="status-value" id="players">-/-</div>
                </div>
                <div class="status-item">
                    <div class="status-label">延迟</div>
                    <div class="status-value" id="ping">- ms</div>
                </div>
            <img src="https://tool.lu/netcard/">
            </div>
            <div class="status-refresh">
                <button class="refresh-btn" id="refreshStatusBtn">
                    <span class="icon">🔄</span> 刷新状态
                </button>
            </div>
        </div>
        
        <div class="image-gallery">
            <div class="image-item">
                <img src="img1.jpg" alt="服务器截图1">
                <div class="image-caption">服务器主城风景</div>
            </div>
            <div class="image-item">
                <img src="img2.jpg" alt="服务器截图2">
                <div class="image-caption">玩家建筑展示</div>
            </div>
        </div>
        
        <div class="button-group">
            <button class="btn map-btn" id="mapBtn">
                <span class="icon">🗺️</span> 网页地图
            </button>
            <button class="btn copy-btn" id="copyBtn2">
                <span class="icon">📋</span> 复制服务器地址
            </button>
            <button class="btn qq-btn" id="qqBtn">
                <span class="icon">👥</span> 加入QQ群
            </button>
            <button class="btn video-btn" id="videoBtn">
                <span class="icon">🎬</span> 宣传视频
            </button>
            <button class="btn music-btn" id="musicBtn">
                <span class="icon">🎵</span> 恰喽
            </button>
            <button class="btn sponsor-btn" id="sponsorBtn">
                <span class="icon">❤️</span> 赞助列表
            </button>
        </div>
        <!-- 友情链接部分 -->
        <div class="friend-link">
            <h3 style="color: #fff; margin-bottom: 15px; text-align: center;">友情链接</h3>
            <div style="text-align: center;">
                <button class="btn friend-btn" id="friendBtn">
                    <span class="icon">🤝</span> 白灵的服务器
                </button>
            </div>
        </div>
        
        <footer>
            © 2025 Kanazawa服务器 - 所有权利保留
        </footer>
    </div>
    
    <!-- 赞助列表遮罩层 -->
    <div class="sponsor-overlay" id="sponsorOverlay">
        <div class="sponsor-container">
            <button class="close-btn" id="closeSponsorBtn">×</button>
            <h2>赞助列表</h2>
            <div id="sponsorTableContainer">
                <!-- 这里会动态加载赞助列表表格 -->
            </div>
        </div>
    </div>
    
    <div class="notification" id="notification">
        <span class="icon">✅</span>
        <span id="notificationText">操作成功</span>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const copyBtn = document.getElementById('copyBtn');
            const copyBtn2 = document.getElementById('copyBtn2');
            const qqBtn = document.getElementById('qqBtn');
            const videoBtn = document.getElementById('videoBtn');
            const musicBtn = document.getElementById('musicBtn');
            const sponsorBtn = document.getElementById('sponsorBtn');
            const mapBtn = document.getElementById('mapBtn');
            const notification = document.getElementById('notification');
            const notificationText = document.getElementById('notificationText');
            const sponsorOverlay = document.getElementById('sponsorOverlay');
            const closeSponsorBtn = document.getElementById('closeSponsorBtn');
            const sponsorTableContainer = document.getElementById('sponsorTableContainer');
            
            // 服务器状态相关元素
            const playersElement = document.getElementById('players');
            const pingElement = document.getElementById('ping');
            const serverIconElement = document.getElementById('serverIcon');
            const refreshStatusBtn = document.getElementById('refreshStatusBtn');
            
            // 页面加载时检查服务器状态
            checkServerStatus();
            
            // 刷新服务器状态按钮点击事件
            refreshStatusBtn.addEventListener('click', function() {
                checkServerStatus();
                
                // 添加按钮点击效果
                refreshStatusBtn.style.transform = 'scale(0.95)';
                setTimeout(function() {
                    refreshStatusBtn.style.transform = '';
                }, 200);
            });
            
            // 使用API查询服务器状态
            async function checkServerStatus() {
                try {
                    playersElement.textContent = '查询中...';
                    pingElement.textContent = '查询中...';
                    
                    const startTime = Date.now();
                    const response = await fetch('https://api.mcsrvstat.us/3/play.simpfun.cn:20307');
                    const endTime = Date.now();
                    const ping = endTime - startTime;
                    
                    const data = await response.json();
                    
                    if (data.online) {
                        // 更新页面显示服务器状态
                        playersElement.textContent = `${data.players.online}/${data.players.max}`;
                        pingElement.textContent = `${ping} ms`;
                        
                        // 如果有服务器图标，显示它
                        if (data.icon) {
                            serverIconElement.src = data.icon;
                        } else {
                            serverIconElement.src = 'https://via.placeholder.com/64/333/fff?text=图标';
                        }
                        
                        // 显示通知
                        showNotification('服务器状态: 在线');
                    } else {
                        playersElement.textContent = '离线';
                        pingElement.textContent = '离线';
                        serverIconElement.src = 'https://via.placeholder.com/64/333/fff?text=离线';
                        
                        // 显示通知
                        showNotification('服务器状态: 离线', true);
                    }
                } catch (error) {
                    console.error('查询服务器状态失败:', error);
                    playersElement.textContent = '查询失败';
                    pingElement.textContent = '查询失败';
                    serverIconElement.src = 'https://via.placeholder.com/64/333/fff?text=错误';
                    
                    // 显示通知
                    showNotification('查询服务器状态失败', true);
                }
            }
            
            // 音乐按钮点击事件
            musicBtn.addEventListener('click', function() {
                // 创建音频对象并播放
                const audio = new Audio('1.MP3');
                audio.play().catch(function(error) {
                    console.log('音频播放失败:', error);
                    showNotification('音频播放失败，请检查音频文件是否存在', true);
                });
                
                // 添加按钮点击效果
                musicBtn.style.transform = 'scale(0.95)';
                setTimeout(function() {
                    musicBtn.style.transform = '';
                }, 200);
            });
            
            // 赞助列表按钮点击事件
            sponsorBtn.addEventListener('click', function() {
                // 显示赞助列表遮罩层
                sponsorOverlay.classList.add('active');
                
                // 加载赞助数据
                loadSponsorData();
                
                // 添加按钮点击效果
                sponsorBtn.style.transform = 'scale(0.95)';
                setTimeout(function() {
                    sponsorBtn.style.transform = '';
                }, 200);
            });
            
            // 关闭赞助列表按钮点击事件
            closeSponsorBtn.addEventListener('click', function() {
                sponsorOverlay.classList.remove('active');
            });
            
            // 点击遮罩层关闭赞助列表
            sponsorOverlay.addEventListener('click', function(e) {
                if (e.target === sponsorOverlay) {
                    sponsorOverlay.classList.remove('active');
                }
            });
            
            // 网页地图按钮点击事件
            mapBtn.addEventListener('click', function() {
                // 跳转到网页地图
                window.open('http://bedrock.kanazawa.top:12927', '_blank');
                
                // 添加按钮点击效果
                mapBtn.style.transform = 'scale(0.95)';
                setTimeout(function() {
                    mapBtn.style.transform = '';
                }, 200);
            });
            
            // 加载赞助数据函数
            function loadSponsorData() {
                // 使用fetch获取prof.txt文件
                fetch('prof.txt')
                    .then(response => {
                        if (!response.ok) {
                            throw new Error('文件加载失败');
                        }
                        return response.text();
                    })
                    .then(data => {
                        // 解析赞助数据
                        const sponsors = parseSponsorData(data);
                        
                        // 生成表格HTML
                        const tableHTML = generateSponsorTable(sponsors);
                        
                        // 更新DOM
                        sponsorTableContainer.innerHTML = tableHTML;
                    })
                    .catch(error => {
                        console.error('加载赞助数据失败:', error);
                        sponsorTableContainer.innerHTML = `
                            <p style="text-align: center; color: #ff5252; margin-top: 20px;">
                                加载赞助数据失败: ${error.message}
                            </p>
                        `;
                    });
            }
            
            // 解析赞助数据函数
            function parseSponsorData(data) {
                const lines = data.split('\n');
                const sponsors = [];
                let totalAmount = 0;
                
                for (let line of lines) {
                    // 移除前后空白字符
                    line = line.trim();
                    
                    // 跳过空行
                    if (!line) continue;
                    
                    // 查找最后一个空格，用于分割姓名和金额
                    const lastSpaceIndex = line.lastIndexOf(' ');
                    
                    if (lastSpaceIndex > 0) {
                        const name = line.substring(0, lastSpaceIndex).trim();
                        const amountStr = line.substring(lastSpaceIndex + 1).trim();
                        
                        // 提取数字部分
                        const amountMatch = amountStr.match(/(\d+(\.\d+)?)/);
                        
                        if (amountMatch) {
                            const amount = parseFloat(amountMatch[0]);
                            totalAmount += amount;
                            
                            sponsors.push({
                                name: name,
                                amount: amount,
                                amountStr: amountStr
                            });
                        }
                    }
                }
                
                return {
                    sponsors: sponsors,
                    totalAmount: totalAmount
                };
            }
            
            // 生成赞助表格函数
            function generateSponsorTable(data) {
                const { sponsors, totalAmount } = data;
                
                if (sponsors.length === 0) {
                    return '<p style="text-align: center; margin-top: 20px;">暂无赞助数据</p>';
                }
                
                let tableHTML = `
                    <table class="sponsor-table">
                        <thead>
                            <tr>
                                <th class="name-col">赞助人</th>
                                <th class="amount-col">金额</th>
                            </tr>
                        </thead>
                        <tbody>
                `;
                
                // 按金额降序排序
                sponsors.sort((a, b) => b.amount - a.amount);
                
                // 添加每一行数据
                sponsors.forEach(sponsor => {
                    tableHTML += `
                        <tr>
                            <td class="name-col">${sponsor.name}</td>
                            <td class="amount-col">${sponsor.amountStr}</td>
                        </tr>
                    `;
                });
                
                tableHTML += `
                        </tbody>
                    </table>
                    <div class="total-amount">
                        总计: ${totalAmount.toFixed(2)}元
                    </div>
                `;
                
                return tableHTML;
            }
